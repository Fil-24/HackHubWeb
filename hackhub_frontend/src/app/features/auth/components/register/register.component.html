<div class="register-container">
  <img src="assets/img/logo.svg" alt="Logo" id="logo">
  <div class="card" id="card-signup">
    <h2 id="signup-title">Registration</h2>
    <form class="frm" (ngSubmit)="register()" ngNativeValidate>
      <input type="text" class="input" [(ngModel)]="name" name="name" placeholder="Name" required />
      <input type="text" class="input" [(ngModel)]="surname" name="surname" placeholder="Surname" required />
      <input type="text" class="input" [(ngModel)]="nickname" name="nickname" placeholder="Nickname" required />
      <input type="email" class="input" [(ngModel)]="email" name="email" placeholder="Email" required />
      <input type="password" class="input" [(ngModel)]="password" name="password" placeholder="Password" required/>
      <input type="password" class="input" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required/>
      
      <div class="select-wrapper">
        <select [(ngModel)]="role" class="input select" name="role">
          <option value="USER">User</option>
          <option value="STAFF">Staff</option>
        </select>
        <img src="assets/img/Expand_down.svg" class="select-arrow" alt="Freccia">
      </div>
    
      @if (errorMessage()) {
        <div class="alert alert-error">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <button class="btn btn-primary" type="submit" id="btn-signup">Sign Up</button>
    </form>
  </div>
</div>
