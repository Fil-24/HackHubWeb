name: Trigger auto deployment for cn-hackhub-frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'hackhub_frontend/**'
      - '.github/workflows/cn-hackhub-frontend-AutoDeployTrigger-de9cc01b-5a6c-4d30-815a-04b2cae689f1.yml'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write # Necessario per OIDC JWT Token
      contents: read  # Necessario per accedere al repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4 # Aggiornato alla v4

      # --- FASE 1: VALIDAZIONE DEL CODICE (CI) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0' 
          cache: 'npm'
          cache-dependency-path: 'hackhub_frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./hackhub_frontend
        run: npm ci

      - name: Run Linting
        working-directory: ./hackhub_frontend
        run: npm run lint --if-present

      - name: Run Tests
        working-directory: ./hackhub_frontend
        # Assicurati che in Angular karma.conf.js o angular.json sia configurato per usare ChromeHeadless
        run: npm run test -- --watch=false --browsers=ChromeHeadless 

      # --- FASE 2: BUILD DOCKER E DEPLOY (CD) ---
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CNHACKHUBFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CNHACKHUBFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CNHACKHUBFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/hackhub_frontend
          registryUrl: docker.io
          registryUsername: ${{ secrets.CNHACKHUBFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CNHACKHUBFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: cn-hackhub-frontend
          resourceGroup: rg-hackhub
          imageToBuild: fili24/cn-hackhub-frontend:${{ github.sha }}
