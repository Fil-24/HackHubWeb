name: Trigger auto deployment for cn-hackhub-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'hackhub_backend/**'
    - '.github/workflows/cn-hackhub-backend-AutoDeployTrigger-cfb0f9e4-d08c-4743-a4dc-877a4ec3633b.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/hackhub_backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.CNHACKHUBBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CNHACKHUBBACKEND_REGISTRY_PASSWORD }}
          containerAppName: cn-hackhub-backend
          resourceGroup: rg-hackhub
          imageToBuild: fili24/cn-hackhub-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


