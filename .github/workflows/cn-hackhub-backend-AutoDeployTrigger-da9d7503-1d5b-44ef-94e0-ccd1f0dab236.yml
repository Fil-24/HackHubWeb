name: Trigger auto deployment for cn-hackhub-backend

on:
  push:
    branches: 
      [ main ]
    paths:
    - 'hackhub_backend/**'
    - '.github/workflows/cn-hackhub-backend-AutoDeployTrigger-da9d7503-1d5b-44ef-94e0-ccd1f0dab236.yml'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write 
      contents: read 

    steps:
      # Scarica il codice dal repository 
      - name: Checkout to the branch
        uses: actions/checkout@v4

      # Imposta l'ambiente Java 
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Esegue i test del backend
      - name: Run Backend Tests
        working-directory: ./hackhub_backend
        run: mvn clean test --no-transfer-progress

      # Login su Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CNHACKHUBBACKEND_AZURE_SUBSCRIPTION_ID }}

      # Build e Deploy 
      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/hackhub_backend
          dockerfilePath: Dockerfile 
          registryUrl: docker.io
          registryUsername: ${{ secrets.CNHACKHUBBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CNHACKHUBBACKEND_REGISTRY_PASSWORD }}
          containerAppName: cn-hackhub-backend
          resourceGroup: rg-hackhub
          imageToBuild: fili24/cn-hackhub-backend:${{ github.sha }}